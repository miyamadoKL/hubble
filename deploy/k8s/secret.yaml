apiVersion: v1
kind: Secret
metadata:
  name: hubble-secret
type: Opaque
# configmap.yaml の datasources.yaml が passwordEnv で参照する環境変数と、アプリ
# 永続化用 DATABASE_URL をまとめて保持する。プレースホルダはいずれも NOT a real
# secret — replace it (or manage this Secret out-of-band, e.g. with a
# sealed-secret / external-secrets operator) before deploying.
stringData:
  # configmap.yaml の datasources.yaml エントリ trino-default の
  # passwordEnv: TRINO_PASSWORD が参照する、Trino Basic-auth の技術アカウント用
  # パスワード。キー名は passwordEnv の値と一致していれば任意で変更できる。
  TRINO_PASSWORD: 'changeme-placeholder'
  # mysql/postgresql データソースを datasources.yaml に追加するときの passwordEnv 例:
  # MYSQL_PASSWORD: 'changeme-placeholder'
  # PG_WAREHOUSE_PASSWORD: 'changeme-placeholder'
  #
  # passwordFile 方式 (Secret をボリュームマウント) の例:
  #   datasources.yaml:
  #     passwordFile: /etc/hubble/secrets/mysql-password
  #   deployment.yaml:
  #     volumeMounts + volumes (secretName: hubble-datasource-secrets)
  #   別 Secret hubble-datasource-secrets:
  #     stringData:
  #       mysql-password: |
  #         changeme-placeholder
  #
  # アプリ永続化用 PostgreSQL の接続文字列 (1st/production 既定のバックエンド)。
  # クエリ対象データの postgresql データソース (datasources.yaml) とは別物で、
  # Notebook、Workflow、Schedule、Alert、共有設定、履歴などの application data を
  # 保持する。接続情報は
  # 認証情報を含むため Secret 側に置く。マネージド DB か既存クラスタの利用を
  # 想定しており、この manifest 群には PostgreSQL 本体 (StatefulSet 等) は含めない。
  DATABASE_URL: 'postgres://hubble:CHANGE_ME@postgres.hubble.svc:5432/hubble'
