apiVersion: v1
kind: Secret
metadata:
  name: hubble-secret
type: Opaque
# Trino Basic-auth password for the technical account. The placeholder below is
# NOT a real secret — replace it (or manage this Secret out-of-band, e.g. with a
# sealed-secret / external-secrets operator) before deploying.
stringData:
  TRINO_PASSWORD: 'changeme-placeholder'
  # To use PostgreSQL instead of SQLite, set DATABASE_URL here (it carries
  # credentials, so it belongs in the Secret). When set, the PVC is unnecessary
  # and the replicas=1 constraint can be relaxed (see docs/operations.md §9.4).
  # DATABASE_URL: 'postgres://hubble:CHANGE_ME@postgres.hubble.svc:5432/hubble'
