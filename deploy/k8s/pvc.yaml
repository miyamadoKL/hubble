# Non-production 向け: SQLite (DB_PATH) を永続化バックエンドに使う場合にのみ必要な
# PVC。既定 (PostgreSQL、DATABASE_URL) 構成では不要なため、kustomization.yaml の
# resources には含めていない。使う場合は kustomization.yaml に追加し、
# deployment.yaml のコメントアウトされた data ボリューム/volumeMount を有効化する
# (docs/deployment.md §5)。
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hubble-data
spec:
  accessModes:
    # ReadWriteOnce: a single node mounts the volume. This matches replicas=1 —
    # the SQLite store must be opened by exactly one server process.
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Uncomment to pin a StorageClass; otherwise the cluster default is used.
  # storageClassName: standard
