apiVersion: v1
kind: ConfigMap
metadata:
  name: hubble-config
# Non-secret environment for the server. The full reference (defaults, meaning)
# is docs/operations.md §4. Secrets (e.g. TRINO_PASSWORD) live in the Secret.
data:
  PORT: '8080'
  # SQLite path on the mounted PVC (see pvc.yaml / deployment volumeMounts).
  DB_PATH: /data/hubble.db
  # The image already sets STATIC_DIR; repeated here for visibility.
  STATIC_DIR: /app/packages/web/dist
  # Declarative datasources (mounted at /etc/hubble/datasources.yaml).
  # 既定は既存の単一 Trino 構成と等価。mysql/postgresql を足すときはこの YAML と
  # Secret のパスワードエントリを拡張する (README のデータソース設定を参照)。
  DATASOURCES_PATH: /etc/hubble/datasources.yaml
  datasources.yaml: |
    datasources:
      - id: trino-default
        type: trino
        displayName: Trino
        username: admin
        passwordEnv: TRINO_PASSWORD
        baseUrl: http://trino.trino.svc.cluster.local:8080
        source: hubble
  # Impersonation user and X-Trino-Source (still read from env when set).
  TRINO_USER: admin
  TRINO_USERNAME: admin
  TRINO_SOURCE: hubble
  TRINO_METADATA_SOURCE: hubble-metadata
  # Initial catalog/schema for new notebooks.
  DEFAULT_CATALOG: tpch
  DEFAULT_SCHEMA: tiny
  # Query Guard: estimate scan cost before execution (see docs/operations.md §8.6).
  # QUERY_GUARD_MODE: warn            # off | warn (default) | enforce
  # QUERY_GUARD_MAX_SCAN_BYTES: '0'   # e.g. '107374182400' for 100 GB
  # QUERY_GUARD_MAX_SCAN_ROWS: '0'    # e.g. '1000000000' for 1 B rows
