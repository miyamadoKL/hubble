apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble
spec:
  # query registry、SSE waiter、各 worker の所有状態はプロセス内にあるため、
  # 永続化バックエンドにかかわらず単一 Pod で運用する。
  replicas: 1
  strategy:
    # 実行中の処理を所有する旧 Pod を停止してから新 Pod を起動する。
    # SQLite 構成では、旧 Pod が RWO PVC を解放してから新 Pod が attach する役割も持つ。
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hubble
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hubble
    spec:
      # engine lease の既定 drain 55秒と所有資源closeの猶予を確保する。
      terminationGracePeriodSeconds: 70
      securityContext:
        # Match the image's non-root `node` user (uid/gid 1000)。SQLite 構成
        # (non-production、下記コメント参照) では /data ボリュームへの書き込みに
        # この uid/gid が必要になる。
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: hubble
          image: hubble:0.1.0
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: hubble-config
            - secretRef:
                name: hubble-secret
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: datasources
              mountPath: /etc/hubble/datasources.yaml
              subPath: datasources.yaml
              readOnly: true
            # Non-production 向け: SQLite (DB_PATH + PVC、pvc.yaml) を使う場合は
            # 下記を有効化する。
            # - name: data
            #   mountPath: /data
            # passwordFile 方式の例 (Secret をファイルマウントする場合):
            # - name: datasource-secrets
            #   mountPath: /etc/hubble/secrets
            #   readOnly: true
      volumes:
        - name: datasources
          configMap:
            name: hubble-config
            items:
              - key: datasources.yaml
                path: datasources.yaml
        # Non-production 向け: SQLite (DB_PATH) を使う場合は下記の PVC ボリューム
        # (pvc.yaml) を有効化する。
        # - name: data
        #   persistentVolumeClaim:
        #     claimName: hubble-data
        # passwordFile 用 Secret ボリュームの例:
        # - name: datasource-secrets
        #   secret:
        #     secretName: hubble-datasource-secrets
