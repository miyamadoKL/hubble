apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble
spec:
  # query registry、SSE waiter、各 worker の所有状態はプロセス内にあるため、
  # 永続化バックエンドにかかわらず単一 Pod で運用する。
  replicas: 1
  strategy:
    # 実行中の処理を所有する旧 Pod を停止してから新 Pod を起動する。
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hubble
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hubble
    spec:
      # engine lease の既定 drain 55秒と所有資源closeの猶予を確保する。
      terminationGracePeriodSeconds: 70
      securityContext:
        # Match the image's non-root `node` user (uid/gid 1000)。
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: hubble
          image: hubble:0.1.0
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: hubble-config
            - secretRef:
                name: hubble-secret
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            # ConfigMap の更新を kubelet の投影更新で反映するため、subPath を使わず
            # datasources.yaml と rbac.yaml を同じディレクトリへマウントする。
            - name: config
              mountPath: /etc/hubble
              readOnly: true
            # passwordFile 方式の例 (Secret をファイルマウントする場合):
            # - name: datasource-secrets
            #   mountPath: /etc/hubble/secrets
            #   readOnly: true
      volumes:
        - name: config
          configMap:
            name: hubble-config
            items:
              - key: datasources.yaml
                path: datasources.yaml
              - key: rbac.yaml
                path: rbac.yaml
        # passwordFile 用 Secret ボリュームの例:
        # - name: datasource-secrets
        #   secret:
        #     secretName: hubble-datasource-secrets
