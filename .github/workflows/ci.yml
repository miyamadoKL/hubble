name: CI

# Run on PRs targeting main and on pushes to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. when a PR is force-pushed).
# Pushes to main are never cancelled so every merged commit gets a full run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    # Install + four tasks (typecheck, lint, test, build) on a JS monorepo;
    # 15 min is comfortably above the expected runtime while still failing fast on hangs.
    timeout-minutes: 15

    # PostgreSQL for the backend-parameterized store/migrate tests. They are
    # gated on TEST_DATABASE_URL (test/dbBackends.ts) and skip locally when it is
    # unset; in CI we point them at this service so the pg path runs for real.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: hubble
          POSTGRES_PASSWORD: hubble
          POSTGRES_DB: hubble_test
        ports:
          - 5432:5432
        # Wait for the server to accept connections before tests run.
        options: >-
          --health-cmd "pg_isready -U hubble -d hubble_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # corepack pins pnpm to the version in package.json's "packageManager"
      # field (pnpm@11.6.0), so the CLI version always matches the repo.
      - name: Enable corepack (pnpm 11.6.0 via packageManager)
        run: corepack enable

      # Node 24 to satisfy "engines": { "node": ">=24" }.
      # cache: pnpm caches the pnpm store keyed on pnpm-lock.yaml.
      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Steps are kept separate so a failure points at the exact task.
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (eslint + ast-grep)
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # Unit tests for contracts, server and web. These use a fake Trino, so no
      # external services are required. TEST_DATABASE_URL additionally enables
      # the PostgreSQL-backed store/migrate tests against the service above.
      #
      # Intentionally NOT run here (both need a real Trino instance):
      #   - RUN_TRINO_IT=1 pnpm --filter server test  (server integration tests)
      #   - pnpm --filter @hubble/e2e test          (Playwright e2e)
      - name: Test
        run: pnpm test
        env:
          TEST_DATABASE_URL: postgres://hubble:hubble@localhost:5432/hubble_test

      - name: Build
        run: pnpm build

  docker-parquet-gate:
    name: Docker production Parquet smoke (linux/amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # production prune 後の runtime image を作り、ネイティブ binding を含む構成を検証する。
      - name: Build production image
        run: docker build --platform linux/amd64 -t hubble:parquet-smoke .

      # Dockerfile の USER node を維持したまま、network extension なしで Parquet を検証する。
      - name: Run Parquet production smoke
        run: >-
          docker run --rm --platform linux/amd64 --entrypoint node
          hubble:parquet-smoke
          /app/packages/server/src/resultStore/parquetConverterSmoke.mjs

  duckdb-s3-gate:
    name: DuckDB direct S3 / MinIO credential gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable corepack (pnpm 11.6.0 via packageManager)
        run: corepack enable

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Start MinIO
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        run: >-
          docker run -d --name hubble-duckdb-s3-minio --network host
          -e MINIO_ROOT_USER -e MINIO_ROOT_PASSWORD
          minio/minio@sha256:bf461534d577e8600a22d4cac4830fc754cc6cce2547be399151c8763742f23e
          server /data --address :9000

      - name: Wait for MinIO
        run: |
          node --input-type=module <<'NODE'
          const deadline = Date.now() + 60_000;
          while (Date.now() < deadline) {
            try {
              const response = await fetch('http://127.0.0.1:9000/minio/health/ready');
              if (response.ok) process.exit(0);
            } catch {}
            await new Promise((resolve) => setTimeout(resolve, 1_000));
          }
          throw new Error('MinIO did not become ready within 60 seconds');
          NODE

      - name: Bootstrap scoped MinIO identities
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_READER_USER: hubble-gate-reader
          MINIO_READER_PASSWORD: hubble-gate-reader-secret
          MINIO_WRITER_USER: hubble-gate-writer
          MINIO_WRITER_PASSWORD: hubble-gate-writer-secret
        run: >-
          docker run --rm --network host --entrypoint /bin/sh
          -e MINIO_ROOT_USER -e MINIO_ROOT_PASSWORD
          -e MINIO_READER_USER -e MINIO_READER_PASSWORD
          -e MINIO_WRITER_USER -e MINIO_WRITER_PASSWORD
          -v "$GITHUB_WORKSPACE/.github/fixtures:/policies:ro"
          minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
          -c 'mc alias set local http://127.0.0.1:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" &&
          mc admin policy create local hubble-duckdb-s3-reader /policies/minio-duckdb-s3-reader-policy.json &&
          mc admin policy create local hubble-duckdb-s3-writer /policies/minio-duckdb-s3-writer-policy.json &&
          mc admin user add local "$MINIO_READER_USER" "$MINIO_READER_PASSWORD" &&
          mc admin user add local "$MINIO_WRITER_USER" "$MINIO_WRITER_PASSWORD" &&
          mc admin policy attach local hubble-duckdb-s3-reader --user "$MINIO_READER_USER" &&
          mc admin policy attach local hubble-duckdb-s3-writer --user "$MINIO_WRITER_USER"'

      - name: Build production image with baked httpfs
        run: docker build --platform linux/amd64 -t hubble:duckdb-s3-gate .

      - name: Run DuckDB direct S3 production gate
        run: >-
          docker run --rm --network host --entrypoint /app/packages/server/node_modules/.bin/tsx
          -e DUCKDB_S3_ENDPOINT=http://127.0.0.1:9000
          -e DUCKDB_S3_REGION=us-east-1
          -e DUCKDB_S3_BOOTSTRAP_ACCESS_KEY_ID=minioadmin
          -e DUCKDB_S3_BOOTSTRAP_SECRET_ACCESS_KEY=minioadmin
          -e DUCKDB_S3_WRITER_ACCESS_KEY_ID=hubble-gate-writer
          -e DUCKDB_S3_WRITER_SECRET_ACCESS_KEY=hubble-gate-writer-secret
          -e DUCKDB_S3_READER_ACCESS_KEY_ID=hubble-gate-reader
          -e DUCKDB_S3_READER_SECRET_ACCESS_KEY=hubble-gate-reader-secret
          hubble:duckdb-s3-gate
          /app/packages/server/src/resultStore/duckdbS3GateSmoke.ts

      - name: Show MinIO logs on failure
        if: failure()
        run: docker logs hubble-duckdb-s3-minio 2>/dev/null || true

      - name: Cleanup MinIO
        if: always()
        run: docker rm -f hubble-duckdb-s3-minio 2>/dev/null || true
