# Hubble SQL Workbench — local / demo stack.
#
#   docker compose up --build
#   → Hubble on http://localhost:8080, backed by a demo Trino (tpch catalog).
#
# `hubble` reads optional overrides from a local `.env` (git-ignored). The demo
# `trino` service ships the tpch catalog so the stack works with no external
# data source. Trino の接続情報 (baseUrl / Basic 認証 / source タグ) は
# deploy/compose/datasources.yaml (DATASOURCES_PATH) にまとめて定義する。外部
# Trino に接続する場合は、そのファイルの baseUrl / username / passwordEnv を
# 書き換えるか、DATASOURCES_PATH で別ファイルを指す。
#
# 永続化は PostgreSQL (DATABASE_URL) のみを使用する (下記 postgres サービス)。
services:
  hubble:
    build: .
    image: hubble:0.1.0
    ports:
      - '8080:8080'
    environment:
      # Pin the in-container port so it always matches the ports mapping above —
      # a host-side .env may move the *dev-server* port (e.g. PORT=8081 to dodge
      # a local clash), but that must not leak into the container via env_file.
      PORT: '8080'
      # 宣言的データソース定義ファイル (Trino の baseUrl/認証/source はここに集約)。
      DATASOURCES_PATH: /etc/hubble/datasources.yaml
      # Compose デモ用の明示的 RBAC 定義。ロールと datasource allowlist はファイルで管理する。
      RBAC_PATH: /etc/hubble/rbac.yaml
      # deploy/compose/datasources.yaml の passwordEnv: TRINO_PASSWORD が参照する
      # 環境変数。デモ Trino は認証不要のため既定値は空文字。外部 Trino に接続する
      # 場合は .env に TRINO_PASSWORD=*** を設定する。
      TRINO_PASSWORD: ${TRINO_PASSWORD:-}
      # X-Trino-User (impersonation ユーザー)。Trino の接続情報そのものではないため
      # 廃止対象ではなく維持する。
      TRINO_USER: ${TRINO_USER:-admin}
      DEFAULT_CATALOG: ${DEFAULT_CATALOG:-tpch}
      DEFAULT_SCHEMA: ${DEFAULT_SCHEMA:-tiny}
      # PostgreSQL 永続化バックエンド。既定パスワードは開発専用のプレースホルダ
      # (本番では .env で上書き)。
      DATABASE_URL: ${DATABASE_URL:-postgres://hubble:hubble-dev@postgres:5432/hubble}
    # Optional: a local .env supplies/overrides any variable (incl. secrets like
    # TRINO_PASSWORD). The file is git-ignored; absence is tolerated.
    env_file:
      - path: .env
        required: false
    volumes:
      # データソース定義を読み取り専用でマウント。
      - ./deploy/compose/datasources.yaml:/etc/hubble/datasources.yaml:ro
      # 明示的な demo RBAC 定義を読み取り専用でマウント。
      - ./deploy/compose/rbac.yaml:/etc/hubble/rbac.yaml:ro
    depends_on:
      trino:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  trino:
    image: trinodb/trino:479
    ports:
      # Exposed for convenience (query Trino directly at http://localhost:8090);
      # moved to 8090 on the host because Hubble occupies 8080.
      # Hubble uses the internal service name, not this published port.
      - '8090:8080'
    volumes:
      # Demo config: only the tpch catalog is added; everything else uses the
      # official image defaults.
      - ./deploy/docker/trino/etc/catalog:/etc/trino/catalog:ro
    # Uses the built-in HEALTHCHECK from the official trinodb/trino image
    # (/usr/lib/trino/bin/health-check) — no curl dependency required.
    # depends_on: condition: service_healthy works without any override here.
    restart: unless-stopped

  # Hubble の永続化 (notebooks / saved queries / query history) 用 PostgreSQL。
  # クエリ対象データ (Trino/mysql/postgresql データソース) とは別物で、アプリの
  # 内部状態のみを保持する。
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hubble
      POSTGRES_USER: hubble
      # 開発用の既定パスワード。共有環境や本番相当で使う場合は .env で上書きすること。
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hubble-dev}
    volumes:
      - hubble-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hubble -d hubble']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  # PostgreSQL の永続化ボリューム (既定の DATABASE_URL バックエンド)。
  hubble-postgres-data:
